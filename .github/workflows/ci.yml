name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      # Real-kernel validation of the IP_HDRINCL send path (issue #12 fix): the ignored
      # test crafts IPv4 ICMP/UDP/TCP packets and sends them via a raw IP_HDRINCL socket,
      # which only succeeds if this OS's ip_len/ip_off byte order is correct (BSD kernels
      # reject a wrong order with EINVAL at send time). Requires root.
      - name: Validate IP_HDRINCL send path on real kernel (root)
        run: |
          BIN=$(cargo test --lib --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and (.target.kind[]? == "lib")) | .executable')
          echo "lib test binary: $BIN"
          sudo "$BIN" runtime_hdrincl --ignored --nocapture

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt -- --check

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      # Validates the macOS host-order ip_len/ip_off branch on a real Darwin kernel
      # (also covers NetBSD, which shares the host-order branch). Requires root.
      - name: Validate IP_HDRINCL send path on real kernel (root)
        run: |
          BIN=$(cargo test --lib --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and (.target.kind[]? == "lib")) | .executable')
          echo "lib test binary: $BIN"
          sudo "$BIN" runtime_hdrincl --ignored --nocapture

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@1.88

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV
        run: cargo check --verbose

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y ca_root_nss curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          run: |
            . $HOME/.cargo/env
            cargo build --verbose
            cargo test --verbose
            # Validate the IP_HDRINCL send path on a real FreeBSD kernel (network-order
            # ip_len/ip_off since FreeBSD >= 11). The VM runs as root, so no sudo needed.
            cargo test --lib runtime_hdrincl -- --ignored --nocapture
            cargo clippy --all-targets -- -D warnings
